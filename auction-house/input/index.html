<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auction House – Property</title>
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="../../auction-house.css" />
</head>
<body class="metrics-page mv-landing ah-page">
  <div class="mv-landing-bg" aria-hidden="true"></div>

  <div id="operatorOnlyDenied" class="ah-denied-wrap" hidden>
    <h1 class="mv-landing-title">Auction House</h1>
    <p id="operatorOnlyDeniedMsg" class="mv-landing-lead" style="margin-top: 12px;"></p>
    <a id="operatorOnlySignIn" class="mv-btn mv-btn-primary" style="margin-top: 12px;" hidden href="../../auth/">Sign in</a>
  </div>

  <main id="operatorOnlyMain" class="ah-main" hidden>
    <header class="ah-header">
      <a class="ah-brand" href="../" style="text-decoration:none;color:inherit;">Auction House</a>
      <nav class="ah-header-links" aria-label="Auction House navigation">
        <a href="../">Home</a>
        <span class="ah-nav-current" aria-current="page">MV Auction</span>
        <a href="../final/">Final board</a>
        <a href="../day/">Auction Display</a>
      </nav>
    </header>

    <section class="ah-grid">
      <section class="ah-card" aria-labelledby="ah-prop-h">
        <h2 id="ah-prop-h">Auction House setup</h2>
        <div class="ah-field">
          <label for="ahAddress">Address</label>
          <textarea id="ahAddress" rows="3" maxlength="500" placeholder="Street, suburb" autocomplete="street-address"></textarea>
        </div>
        <div class="ah-field-row">
          <div class="ah-field">
            <label for="ahBeds">Bed #</label>
            <input id="ahBeds" type="text" inputmode="numeric" maxlength="8" placeholder="e.g. 4" />
          </div>
          <div class="ah-field">
            <label for="ahBaths">Bath #</label>
            <input id="ahBaths" type="text" inputmode="numeric" maxlength="8" placeholder="e.g. 2" />
          </div>
          <div class="ah-field">
            <label for="ahCars">Car #</label>
            <input id="ahCars" type="text" inputmode="numeric" maxlength="8" placeholder="e.g. 2" />
          </div>
        </div>
      </section>

      <section class="ah-card" aria-labelledby="ah-live-h">
        <h2 id="ah-live-h">Live preview</h2>
        <p class="ah-preview-title">Current property</p>
        <div class="ah-preview-main" id="ahPreviewAddress">No address entered</div>
        <div class="ah-preview-sub" id="ahPreviewMeta">Beds — · Baths — · Cars —</div>
        <div class="ah-kv"><span>Current bid</span><strong id="ahPreviewPrice">$0</strong></div>
        <div class="ah-kv"><span>Status</span><strong id="ahPreviewStatus">No call yet</strong></div>
      </section>
    </section>
  </main>

  <footer class="mv-site-footer">
    <div class="mv-site-footer-top">
      <a class="mv-site-footer-link" href="https://www.metricsview.com.au/" target="_blank" rel="noopener">Metricsview.com.au</a>
      <span class="mv-footer-dot-links">
        <a class="mv-corporate-dot-link" href="../../corporate-profile/">•</a>
        <a class="mv-pricing-dot-link" href="../../pricing/">•</a>
        <a class="mv-super-admin-dot-link" href="../../super-admin/">•</a>
      </span>
      <a class="mv-footer-support-text-link" href="../../support/">Support</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../super-admin-access.js"></script>
  <script src="../../supabase-config.js"></script>
  <script src="../../operator-only-page-gate.js"></script>
  <script src="../../auction-sync.js"></script>
  <script>
    (function () {
      function bind() {
        var addr = document.getElementById('ahAddress');
        var beds = document.getElementById('ahBeds');
        var baths = document.getElementById('ahBaths');
        var cars = document.getElementById('ahCars');
        if (!addr || !window.mvAuctionSync) return;

        function push() {
          window.mvAuctionSync.update({
            address: (addr.value || '').trim(),
            beds: (beds.value || '').trim(),
            baths: (baths.value || '').trim(),
            cars: (cars.value || '').trim()
          });
        }

        var previewAddress = document.getElementById('ahPreviewAddress');
        var previewMeta = document.getElementById('ahPreviewMeta');
        var previewPrice = document.getElementById('ahPreviewPrice');
        var previewStatus = document.getElementById('ahPreviewStatus');

        function toStatusLabel(st) {
          if (st === 'on_market') return 'On the market';
          if (st === 'going_once') return 'Going once';
          if (st === 'going_twice') return 'Going twice';
          if (st === 'going_three') return 'Going three times';
          if (st === 'sold') return 'SOLD';
          if (st === 'passed_in') return 'Passed in';
          return 'No call yet';
        }

        function renderPreview(s) {
          if (previewAddress) previewAddress.textContent = s.address || 'No address entered';
          if (previewMeta) {
            previewMeta.textContent = 'Beds ' + (s.beds || '—') + ' · Baths ' + (s.baths || '—') + ' · Cars ' + (s.cars || '—');
          }
          if (previewPrice) previewPrice.textContent = window.mvAuctionSync.formatCurrencyAUD(s.price || 0);
          if (previewStatus) previewStatus.textContent = s.passedIn ? 'Passed in' : (s.sold ? 'SOLD' : toStatusLabel(s.status));
        }

        var s = window.mvAuctionSync.load();
        addr.value = s.address || '';
        beds.value = s.beds || '';
        baths.value = s.baths || '';
        cars.value = s.cars || '';
        renderPreview(s);

        ['input', 'change'].forEach(function (ev) {
          addr.addEventListener(ev, push);
          beds.addEventListener(ev, push);
          baths.addEventListener(ev, push);
          cars.addEventListener(ev, push);
        });
        window.mvAuctionSync.listen(renderPreview);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bind);
      } else {
        bind();
      }
      if (window.metricsSyncSuperAdminFooterDot) window.metricsSyncSuperAdminFooterDot();
    })();
  </script>
</body>
</html>
