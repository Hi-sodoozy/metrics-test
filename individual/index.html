<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metrics – Individual</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .ind-main { max-width: 1000px; margin: 0 auto; padding: 28px 20px 40px; }
    .ind-top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
    .ind-toggle { display:flex; gap:8px; }
    .ind-toggle button { border:1px solid #d5d9df; background:#fff; border-radius:6px; padding:9px 12px; font:inherit; cursor:pointer; font-weight:600; color:#3b4c60; }
    .ind-toggle button.active { border-color:#4a6fa5; color:#4a6fa5; }
    .ind-card { background:#fff; border:1px solid #e2e4e8; border-radius:8px; padding:16px; margin-bottom:14px; }
    .ind-card h3 { margin:0 0 8px; font-size:1.05rem; }
    .ind-table { width:100%; border-collapse:collapse; }
    .ind-table th,.ind-table td { border-bottom:1px solid #eee; text-align:left; padding:8px; font-size:14px; }
    .ind-table input { width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; font:inherit; }
    .ind-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .ind-actions a { font-weight:600; color:#4a6fa5; text-decoration:none; }
    .ind-actions a:hover { text-decoration:underline; }
    .ind-metric-preview { color:#5a5a5a; font-size:14px; margin:6px 0 0; line-height:1.4; }
    .ind-empty { color:#6b6b6b; font-size:14px; }
  </style>
</head>
<body class="metrics-page input-page">
  <div class="page-top-brand"><span class="app-brand">Metrics View</span></div>
  <main class="ind-main">
    <p class="ind-empty" style="margin-top:2rem;">Opening your dashboard…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script>
    (function () {
      Promise.resolve()
        .then(function () {
          return window.metricsSyncContextFromSession ? window.metricsSyncContextFromSession() : null;
        })
        .then(function () {
          var ctx = window.metricsGetUserContext ? window.metricsGetUserContext() : null;
          if (!ctx || !ctx.email) {
            window.location.href = window.metricsAppUrl('');
            return;
          }
          var q = window.location.search || '';
          window.location.replace(window.metricsAppUrl('input/') + (q || ''));
        });
    })();
  </script>
</body>
</html>
