<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Results</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="metrics-page results-page">
  <main class="results-main">
    <header class="results-header" id="resultsHeader">
      <div class="results-header-pic-wrap">
        <div class="results-header-pic" id="resultsHeaderPic"></div>
      </div>
      <h1 class="results-business-name" id="resultsBusinessName">Your business name</h1>
    </header>
    <div class="results-grid" id="resultsGrid"></div>
    <div class="results-bottom-actions">
      <a href="input.html" class="input-link" id="linkToInput">Input</a>
      <button type="button" class="results-theme-toggle" id="resultsThemeToggle" aria-label="Toggle display theme">
        <span class="results-theme-icon" id="resultsThemeIcon" aria-hidden="true">◓</span>
        <span class="results-theme-label" id="resultsThemeLabel">Dark</span>
      </button>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var ownerParam = (params.get('owner') || '').trim();

      function uuidLooksValid(s) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(s || '');
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s == null ? '' : s;
        return div.innerHTML;
      }

      function renderDashboard(data) {
        var grid = document.getElementById('resultsGrid');
        if (!grid) return;

        var headerName = document.getElementById('resultsBusinessName');
        var headerPic = document.getElementById('resultsHeaderPic');
        if (headerName) headerName.textContent = (data.businessName || 'Your business name');
        if (headerPic) {
          if (data.businessImage) {
            headerPic.style.backgroundImage = 'url(' + data.businessImage + ')';
            headerPic.style.backgroundSize = 'cover';
          } else {
            headerPic.style.backgroundImage = '';
          }
        }

        var metrics = (data.metrics && data.metrics.length) ? data.metrics.slice(0, 10) : [];
        var displayed = [];
        for (var i = 0; i < metrics.length; i++) {
          var m = metrics[i];
          if (!m || !m.showOnMainScreen) continue;
          if (displayed.length >= 4) break;
          var displaySummary = m.displaySummary !== false;
          if (m.displayAs === 'ranking') {
            var rank = m.ranking || {};
            var rows = (rank.rows && rank.rows.length) ? rank.rows : [];
            rows = rows.filter(function (r) { return r && (String(r.name).trim() || String(r.goal).trim() || String(r.current).trim()); });
            var totalGoal = 0, totalCurrent = 0;
            for (var t = 0; t < rows.length; t++) {
              totalGoal += parseFloat(rows[t].goal, 10) || 0;
              totalCurrent += parseFloat(rows[t].current, 10) || 0;
            }
            var displayAsPct = !!(rank.displayAsPercent);
            var achieved = totalGoal > 0 && totalCurrent >= totalGoal;
            var valuesText = (displayAsPct && totalGoal > 0) ? ('<span class="current">' + Math.round((totalCurrent / totalGoal) * 100) + '%</span>') : ('<span class="current">' + escapeHtml(String(totalCurrent)) + '</span> / <span class="goal">' + escapeHtml(String(totalGoal)) + '</span>');
            displayed.push({
              type: 'ranking',
              heading: m.heading || 'Summary',
              valuesHtml: valuesText,
              achieved: achieved,
              displaySummary: displaySummary,
              ranking: rank,
              rows: rows,
              sourceBusinessName: m.sourceBusinessName || data.businessName || '',
              sourceBusinessImage: m.sourceBusinessImage || data.businessImage || ''
            });
          } else {
            var cur = parseFloat(m.current, 10) || 0;
            var goal = parseFloat(m.goal, 10) || 0;
            var achieved = goal > 0 && cur >= goal;
            var valuesText;
            if (m.displayAsPercent && goal > 0) {
              valuesText = '<span class="current">' + escapeHtml(String(Math.round((cur / goal) * 100))) + '%</span>';
            } else {
              valuesText = '<span class="current">' + escapeHtml(String(m.current)) + '</span> / <span class="goal">' + escapeHtml(String(m.goal)) + '</span>';
            }
            displayed.push({
              type: 'summary',
              heading: m.heading || 'Metric',
              valuesHtml: valuesText,
              achieved: achieved,
              sourceBusinessName: m.sourceBusinessName || data.businessName || '',
              sourceBusinessImage: m.sourceBusinessImage || data.businessImage || ''
            });
          }
        }

        grid.innerHTML = '';

        if (displayed.length === 0) {
          grid.classList.add('empty');
          return;
        }

        grid.classList.remove('empty');
        grid.classList.add('count-' + displayed.length);

        for (var j = 0; j < displayed.length; j++) {
          var item = displayed[j];
          var col = document.createElement('div');
          col.className = 'result-column';
          var ownerMeta = document.createElement('div');
          ownerMeta.className = 'result-owner-meta';
          ownerMeta.innerHTML =
            '<span class="result-owner-pic"' + (item.sourceBusinessImage ? (' style="background-image:url(' + item.sourceBusinessImage + ')"') : '') + '></span>' +
            '<span class="result-owner-name">' + escapeHtml(item.sourceBusinessName || 'Board') + '</span>';
          col.appendChild(ownerMeta);

          if (item.type === 'summary') {
            var card = document.createElement('div');
            card.className = 'result-card' + (item.achieved ? ' achieved' : '');
            card.innerHTML =
              '<div class="result-card-inner">' +
              '<h2 class="result-heading">' + escapeHtml(item.heading) + '</h2>' +
              '<p class="result-values">' + item.valuesHtml + '</p>' +
              '</div>';
            col.appendChild(card);
          } else {
            if (item.displaySummary) {
              var card2 = document.createElement('div');
              card2.className = 'result-card result-card-summary' + (item.achieved ? ' achieved' : '');
              card2.innerHTML =
                '<div class="result-card-inner">' +
                '<h2 class="result-heading">' + escapeHtml(item.heading) + '</h2>' +
                '<p class="result-values">' + item.valuesHtml + '</p>' +
                '</div>';
              col.appendChild(card2);
            }
            if (item.rows && item.rows.length > 0) {
              var withPct = item.rows.map(function (r) {
                var cur = parseFloat(r.current, 10) || 0;
                var goal = parseFloat(r.goal, 10) || 0;
                var indGoal = r.individualGoal != null ? parseFloat(r.individualGoal, 10) : NaN;
                if (!isNaN(indGoal) && indGoal > 0) goal = indGoal;
                return { name: r.name || '', goal: r.goal, current: r.current, individualGoal: r.individualGoal, pct: goal > 0 ? (cur / goal) * 100 : 0 };
              });
              withPct.sort(function (a, b) { return b.pct - a.pct; });
              var displayAsPct = !!(item.ranking && item.ranking.displayAsPercent);
              var list = document.createElement('div');
              list.className = 'ranking-results' + (item.displaySummary ? '' : ' ranking-results-full');
              list.innerHTML = '<h2 class="ranking-results-title">' + escapeHtml(item.heading) + '</h2>';
              var ul = document.createElement('ul');
              ul.className = 'ranking-list';
              for (var k = 0; k < withPct.length; k++) {
                var it = withPct[k];
                var indGoalPart = (it.individualGoal != null && String(it.individualGoal).trim()) ? ('<span class="ranking-individual-goal">' + escapeHtml(String(it.individualGoal)) + '</span>') : '';
                var valText = displayAsPct ? (Math.round(it.pct) + '%') : (escapeHtml(String(it.current)) + ' / ' + escapeHtml(String(it.goal)));
                var parts = ['<span class="ranking-name">' + escapeHtml(it.name) + '</span>'];
                if (indGoalPart) parts.push(indGoalPart);
                parts.push('<span class="ranking-value">' + valText + '</span>');
                var li = document.createElement('li');
                li.className = 'ranking-list-item';
                li.innerHTML = parts.join(' ');
                ul.appendChild(li);
              }
              list.appendChild(ul);
              col.appendChild(list);
            }
          }
          grid.appendChild(col);
        }
      }

      function loadFromLocalStorage(key) {
        var raw;
        try { raw = localStorage.getItem(key); } catch (e) { raw = null; }
        var data = { businessName: '', businessImage: '', metrics: [] };
        if (raw) {
          try {
            var parsed = JSON.parse(raw);
            data.businessName = (parsed.businessName != null) ? String(parsed.businessName) : '';
            data.businessImage = (parsed.businessImage != null) ? String(parsed.businessImage) : '';
            data.metrics = (parsed && parsed.metrics) ? parsed.metrics.slice(0, 4) : (Array.isArray(parsed) ? parsed.slice(0, 4) : []);
          } catch (e) {}
        }
        return data;
      }

      function cloneMetricWithSource(metric, businessName, businessImage) {
        var out = JSON.parse(JSON.stringify(metric || {}));
        out.sourceBusinessName = businessName || '';
        out.sourceBusinessImage = businessImage || '';
        return out;
      }

      function buildCombinedHomeDashboard(userCtx) {
        return window.metricsLoadBusinessDashboard(userCtx.userId).then(function (homeDash) {
          var combined = {
            businessName: homeDash.businessName || '',
            businessImage: homeDash.businessImage || '',
            metrics: []
          };
          var ownMetrics = Array.isArray(homeDash.metrics) ? homeDash.metrics : [];
          var ownTagged = ownMetrics.map(function (m) {
            return cloneMetricWithSource(m, combined.businessName, combined.businessImage);
          });
          if (!window.metricsFetchInvitesForEmail) {
            combined.metrics = ownTagged;
            return combined;
          }
          return window.metricsFetchInvitesForEmail(userCtx.email).then(function (res) {
            var list = (res && res.data) ? res.data : [];
            var slotInvites = list.filter(function (r) {
              return r && r.metric_index != null && r.metric_index >= 0 && r.metric_index <= 9 && r.status !== 'revoked';
            });
            if (!slotInvites.length) {
              combined.metrics = ownTagged;
              return combined;
            }
            var owners = {};
            slotInvites.forEach(function (r) { owners[r.owner_user_id] = true; });
            var ownerIds = Object.keys(owners);
            return Promise.all(ownerIds.map(function (oid) {
              return window.metricsLoadBusinessDashboard(oid);
            })).then(function (dashboards) {
              var byOwner = {};
              ownerIds.forEach(function (oid, idx) {
                byOwner[oid] = dashboards[idx];
              });
              var invitedMetrics = [];
              slotInvites.forEach(function (inv) {
                var dash = byOwner[inv.owner_user_id];
                var metric = dash && dash.metrics ? dash.metrics[inv.metric_index] : null;
                if (!metric) return;
                invitedMetrics.push(cloneMetricWithSource(
                  metric,
                  (dash && dash.businessName) || inv.business_name || '',
                  (dash && dash.businessImage) || ''
                ));
              });
              combined.metrics = invitedMetrics.concat(ownTagged);
              return combined;
            });
          }).catch(function () {
            combined.metrics = ownTagged;
            return combined;
          });
        });
      }

      var RESULTS_THEME_KEY = 'metricsResultsDisplayTheme';
      var INPUT_THEME_KEY = 'metricsInputDisplayTheme';
      function applyResultsTheme(theme) {
        var t = theme === 'dark' ? 'dark' : 'light';
        document.body.classList.toggle('results-theme-dark', t === 'dark');
        document.body.classList.toggle('results-theme-light', t !== 'dark');
        try { localStorage.setItem(RESULTS_THEME_KEY, t); } catch (e) {}
        var toggle = document.getElementById('resultsThemeToggle');
        if (toggle) {
          var label = document.getElementById('resultsThemeLabel');
          var icon = document.getElementById('resultsThemeIcon');
          var nextTheme = t === 'dark' ? 'light' : 'dark';
          var nextLabel = nextTheme === 'dark' ? 'Dark' : 'Light';
          var nextIcon = nextTheme === 'dark' ? '◔' : '◑';
          if (label) label.textContent = nextLabel;
          if (icon) icon.textContent = nextIcon;
          toggle.setAttribute('aria-label', 'Switch to ' + nextTheme + ' view');
        }
      }
      function initResultsTheme() {
        var stored = 'light';
        try {
          stored = localStorage.getItem(RESULTS_THEME_KEY) || localStorage.getItem(INPUT_THEME_KEY) || 'light';
        } catch (e) {}
        applyResultsTheme(stored);
      }

      Promise.resolve()
        .then(function () {
          return window.metricsSyncContextFromSession ? window.metricsSyncContextFromSession() : null;
        })
        .then(function () {
          var toggle = document.getElementById('resultsThemeToggle');
          if (toggle) {
            toggle.addEventListener('click', function () {
              var isDark = document.body.classList.contains('results-theme-dark');
              applyResultsTheme(isDark ? 'light' : 'dark');
            });
          }
          initResultsTheme();
          var userCtx = window.metricsGetUserContext ? window.metricsGetUserContext() : null;
          if (!userCtx || !userCtx.email) {
            window.location.href = 'welcome.html';
            return null;
          }

          var linkInput = document.getElementById('linkToInput');
          var ownerId = uuidLooksValid(ownerParam) ? ownerParam : userCtx.userId;
          if (linkInput) {
            linkInput.href = uuidLooksValid(ownerParam) && ownerParam !== userCtx.userId
              ? ('input.html?owner=' + encodeURIComponent(ownerId))
              : 'input.html';
          }

          if (!window.metricsLoadBusinessDashboard) {
            renderDashboard(loadFromLocalStorage('metricsDashboard'));
            return null;
          }
          if (!uuidLooksValid(ownerParam) || ownerId === userCtx.userId) {
            return buildCombinedHomeDashboard(userCtx).then(function (data) {
              renderDashboard(data);
            }).catch(function () {
              renderDashboard(loadFromLocalStorage('metricsDashboard'));
            });
          }
          return window.metricsLoadBusinessDashboard(ownerId).then(function (data) {
            renderDashboard(data);
          }).catch(function () {
            renderDashboard(loadFromLocalStorage('metricsDashboard'));
          });
        });
    })();
  </script>
</body>
</html>
