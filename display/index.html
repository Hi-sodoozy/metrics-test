<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Results</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../style-redesign.css" />
</head>
<body class="metrics-page results-page">
  <main class="results-main">
    <div class="results-grid" id="resultsGrid"></div>
    <div class="results-bottom-dock" id="resultsBottomDock">
      <div class="results-bottom-cluster">
        <div class="results-bottom-actions" id="resultsBottomActions">
          <a href="../input/" class="input-link" id="linkToInput">Metrics Centre</a>
          <div class="results-display-theme-group" role="group" aria-labelledby="resultsDisplayThemeLegend">
            <span class="results-display-theme-legend" id="resultsDisplayThemeLegend">Display</span>
            <div class="results-display-theme-segments">
              <button type="button" class="results-theme-seg results-theme-seg-active" data-display-theme="light">Light</button>
              <button type="button" class="results-theme-seg" data-display-theme="dark">Dark</button>
            </div>
          </div>
        </div>
        <button type="button" class="results-bottom-reveal-hit" id="resultsBottomReveal" aria-label="Show Metrics Centre and display options" aria-expanded="false" aria-controls="resultsBottomActions"></button>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../super-admin-access.js"></script>
  <script src="../supabase-config.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var ownerParam = (params.get('owner') || '').trim();

      function uuidLooksValid(s) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(s || '');
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s == null ? '' : s;
        return div.innerHTML;
      }

      function parseMetricNumber(raw) {
        if (raw == null) return NaN;
        var str = String(raw).trim();
        if (!str) return NaN;
        str = str.replace(/\$/g, '').replace(/,/g, '').trim();
        var n = parseFloat(str, 10);
        return isNaN(n) ? NaN : n;
      }

      function ensureTotalLine(ranking) {
        var t = ranking && ranking.totalLine && typeof ranking.totalLine === 'object' ? ranking.totalLine : null;
        if (!t) return { goal: '', current: '' };
        return {
          goal: t.goal != null ? String(t.goal) : '',
          current: t.current != null ? String(t.current) : ''
        };
      }

      function rowGoalNumberForAgg(r) {
        var g = parseMetricNumber(r.goal) || 0;
        var indG = r.individualGoal != null ? parseMetricNumber(r.individualGoal) : NaN;
        if (!isNaN(indG) && indG > 0) g = indG;
        return g;
      }

      function sumRankingIndividualCurrents(rows) {
        var s = 0;
        (rows || []).forEach(function (r) {
          s += parseMetricNumber(r.current) || 0;
        });
        return s;
      }

      function sumRankingIndividualGoals(rows) {
        var s = 0;
        (rows || []).forEach(function (r) {
          s += rowGoalNumberForAgg(r);
        });
        return s;
      }

      function rankingRowHasGoalText(r) {
        if (!r) return false;
        if (String(r.goal != null ? r.goal : '').trim()) return true;
        var indG = r.individualGoal != null ? parseMetricNumber(r.individualGoal) : NaN;
        return !isNaN(indG) && indG > 0;
      }

      function rankingRowHasCurrentText(r) {
        return !!(r && String(r.current != null ? r.current : '').trim());
      }

      function totalCurrentManualMismatch(rows, totalLine) {
        var tl = ensureTotalLine({ totalLine: totalLine });
        var manual = String(tl.current || '').trim();
        if (!manual) return false;
        var sum = sumRankingIndividualCurrents(rows);
        var m = parseMetricNumber(manual);
        if (isNaN(m)) return true;
        return Math.abs(m - sum) > 0.009;
      }

      function formatIndividualPairDisplay(it, displayAsPct) {
        var curStr = String(it.current != null ? it.current : '').trim();
        var goalStr = String(it.goal != null ? it.goal : '').trim();
        var curNum = parseMetricNumber(it.current) || 0;
        var goalNum = parseMetricNumber(it.goal) || 0;
        var indGoal = it.individualGoal != null ? parseMetricNumber(it.individualGoal) : NaN;
        if (!isNaN(indGoal) && indGoal > 0) goalNum = indGoal;
        if (displayAsPct && goalNum > 0) {
          return String(Math.round((curNum / goalNum) * 100)) + '%';
        }
        if (curStr !== '' && goalStr !== '') {
          return escapeHtml(curStr) + ' / ' + escapeHtml(goalStr);
        }
        if (curStr !== '') return escapeHtml(curStr);
        if (goalStr !== '') return escapeHtml(goalStr);
        return '';
      }

      function formatTotalLineDisplay(rows, totalLine, displayAsPct) {
        var tl = ensureTotalLine({ totalLine: totalLine });
        var sumC = sumRankingIndividualCurrents(rows);
        var sumG = sumRankingIndividualGoals(rows);
        var anyC = (rows || []).some(rankingRowHasCurrentText);
        var anyG = (rows || []).some(rankingRowHasGoalText);
        var manualC = String(tl.current || '').trim();
        var manualG = String(tl.goal || '').trim();
        var curDisp = manualC || (anyC || sumC !== 0 ? String(sumC) : '');
        var goalDisp = manualG || (anyG || sumG !== 0 ? String(sumG) : '');
        if (displayAsPct) {
          var effG = manualG ? parseMetricNumber(manualG) : sumG;
          if (effG > 0) {
            var effC = manualC ? parseMetricNumber(manualC) : sumC;
            if (isNaN(effC)) effC = sumC;
            return String(Math.round((effC / effG) * 100)) + '%';
          }
        }
        if (curDisp !== '' && goalDisp !== '') {
          return escapeHtml(curDisp) + ' / ' + escapeHtml(goalDisp);
        }
        if (curDisp !== '') return escapeHtml(curDisp);
        if (goalDisp !== '') return escapeHtml(goalDisp);
        return '';
      }

      function normalizeDisplayAccent(raw) {
        var s = String(raw || '').trim();
        if (!s) return '';
        if (/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(s)) return s;
        if (/^[0-9a-fA-F]{6}$/i.test(s)) return '#' + s;
        if (/^(rgb|hsl)a?\(/i.test(s)) return s;
        return s;
      }

      function syncDisplayBoardAccent(data) {
        var mainEl = document.querySelector('.results-main');
        var accent = normalizeDisplayAccent(data && data.displayBoardColor);
        if (accent) {
          document.body.style.setProperty('--mv-display-accent', accent);
          document.body.classList.add('results-display-has-brand-color');
          if (mainEl) mainEl.classList.add('results-has-display-accent');
        } else {
          document.body.style.removeProperty('--mv-display-accent');
          document.body.classList.remove('results-display-has-brand-color');
          if (mainEl) mainEl.classList.remove('results-has-display-accent');
        }
      }

      function renderDashboard(data) {
        var grid = document.getElementById('resultsGrid');
        if (!grid) return;

        window.__mvLastDisplayDashboard = data || {};
        syncDisplayBoardAccent(window.__mvLastDisplayDashboard);

        var linkInput = document.getElementById('linkToInput');
        if (linkInput && window.metricsGetUserContext && window.metricsAppUrl) {
          var uc = window.metricsGetUserContext();
          if (uc && uc.userId) {
            var op = (new URLSearchParams(window.location.search).get('owner') || '').trim();
            var oid = uuidLooksValid(op) ? op : uc.userId;
            linkInput.href =
              uuidLooksValid(op) && op !== uc.userId
                ? window.metricsAppUrl('input/?owner=' + encodeURIComponent(oid))
                : window.metricsAppUrl('input/');
          }
        }

        var metrics = (data.metrics && data.metrics.length) ? data.metrics.slice(0, 10) : [];
        var displayed = [];
        for (var i = 0; i < metrics.length; i++) {
          var m = metrics[i];
          if (!m || !m.showOnMainScreen) continue;
          if (displayed.length >= 4) break;
          var displaySummary = m.displaySummary !== false;
          var rank = m.ranking || {};
          var sip = rank.showIndividualGoalProgress;
          var showIndListValues =
            sip !== false &&
            sip !== 0 &&
            sip !== '0' &&
            String(sip).toLowerCase() !== 'false';
          var rankByPerf = rank.rankPerformance !== false;
          var rows = (rank.rows && rank.rows.length) ? rank.rows.slice() : [];
          rows = rows.filter(function (r) {
            if (!r) return false;
            return !!(
              String(r.name || '').trim() ||
              String(r.goal != null ? r.goal : '').trim() ||
              String(r.current != null ? r.current : '').trim() ||
              String(r.individualGoal != null ? r.individualGoal : '').trim()
            );
          });
          var useRankingLayout = m.displayAs === 'ranking';
          if (useRankingLayout) {
            var legacyEnabled = !!rank.enabled;
            var showSimpleAgg = rank.showSimpleAggregate != null ? !!rank.showSimpleAggregate : legacyEnabled;
            var showMainTotalsCard = displaySummary && rows.length > 0 && (showSimpleAgg || showIndListValues);
            var totalGoal = 0, totalCurrent = 0, achieved = false, valuesText = '';
            if (showMainTotalsCard) {
              var displayAsPctAgg = !!(rank.displayAsPercent);
              if (showSimpleAgg) {
                var sumCA = sumRankingIndividualCurrents(rows);
                var sumGA = sumRankingIndividualGoals(rows);
                var tlA = ensureTotalLine(rank);
                var manualCA = String(tlA.current || '').trim();
                var manualGA = String(tlA.goal || '').trim();
                var anyCA = rows.some(rankingRowHasCurrentText);
                var anyGA = rows.some(rankingRowHasGoalText);
                var curDispA = manualCA || (anyCA || sumCA !== 0 ? String(sumCA) : '');
                var goalDispA = manualGA || (anyGA || sumGA !== 0 ? String(sumGA) : '');
                var effCA = manualCA ? parseMetricNumber(manualCA) : sumCA;
                if (isNaN(effCA)) effCA = sumCA;
                var effGA = manualGA ? parseMetricNumber(manualGA) : sumGA;
                if (isNaN(effGA)) effGA = sumGA;
                achieved = effGA > 0 && effCA >= effGA;
                var hasSubCur = curDispA !== '';
                var hasSubGoal = goalDispA !== '';
                if (displayAsPctAgg && effGA > 0) {
                  var aggPrA = Math.round((effCA / effGA) * 100);
                  var subPartA = '';
                  if (hasSubCur && hasSubGoal) {
                    subPartA =
                      '<span class="result-values-sub">' +
                      escapeHtml(curDispA) +
                      ' / ' +
                      escapeHtml(goalDispA) +
                      '</span>';
                  } else if (hasSubCur) {
                    subPartA = '<span class="result-values-sub">' + escapeHtml(curDispA) + '</span>';
                  } else if (hasSubGoal) {
                    subPartA = '<span class="result-values-sub">' + escapeHtml(goalDispA) + '</span>';
                  }
                  valuesText = '<span class="current">' + escapeHtml(String(aggPrA)) + '%</span>' + subPartA;
                } else {
                  if (hasSubCur && hasSubGoal) {
                    valuesText =
                      '<span class="current">' +
                      escapeHtml(curDispA) +
                      '</span> / <span class="goal">' +
                      escapeHtml(goalDispA) +
                      '</span>';
                  } else if (hasSubCur) {
                    valuesText = '<span class="current">' + escapeHtml(curDispA) + '</span>';
                  } else if (hasSubGoal) {
                    valuesText = '<span class="goal">' + escapeHtml(goalDispA) + '</span>';
                  } else {
                    valuesText = '';
                  }
                }
              } else {
                for (var t = 0; t < rows.length; t++) {
                  var rg = rows[t];
                  var g = parseMetricNumber(rg.goal) || 0;
                  var indG = rg.individualGoal != null ? parseMetricNumber(rg.individualGoal) : NaN;
                  if (!isNaN(indG) && indG > 0) g = indG;
                  totalGoal += g;
                  totalCurrent += parseMetricNumber(rg.current) || 0;
                }
                achieved = totalGoal > 0 && totalCurrent >= totalGoal;
                var hasAggCur = totalCurrent !== 0 || rows.some(rankingRowHasCurrentText);
                var hasAggGoal = totalGoal !== 0 || rows.some(rankingRowHasGoalText);
                if (displayAsPctAgg && totalGoal > 0) {
                  var aggPr2 = Math.round((totalCurrent / totalGoal) * 100);
                  var subPart = '';
                  if (hasAggCur && hasAggGoal) {
                    subPart =
                      '<span class="result-values-sub">' +
                      escapeHtml(String(totalCurrent)) +
                      ' / ' +
                      escapeHtml(String(totalGoal)) +
                      '</span>';
                  } else if (hasAggCur) {
                    subPart = '<span class="result-values-sub">' + escapeHtml(String(totalCurrent)) + '</span>';
                  } else if (hasAggGoal) {
                    subPart = '<span class="result-values-sub">' + escapeHtml(String(totalGoal)) + '</span>';
                  }
                  valuesText = '<span class="current">' + escapeHtml(String(aggPr2)) + '%</span>' + subPart;
                } else {
                  var curStrAgg = hasAggCur ? String(totalCurrent) : '';
                  var goalStrAgg = hasAggGoal ? String(totalGoal) : '';
                  if (curStrAgg !== '' && goalStrAgg !== '') {
                    valuesText =
                      '<span class="current">' +
                      escapeHtml(curStrAgg) +
                      '</span> / <span class="goal">' +
                      escapeHtml(goalStrAgg) +
                      '</span>';
                  } else if (curStrAgg !== '') {
                    valuesText = '<span class="current">' + escapeHtml(curStrAgg) + '</span>';
                  } else if (goalStrAgg !== '') {
                    valuesText = '<span class="goal">' + escapeHtml(goalStrAgg) + '</span>';
                  } else {
                    valuesText = '';
                  }
                }
              }
            }
            displayed.push({
              type: 'ranking',
              heading: m.heading || 'Summary',
              valuesHtml: valuesText,
              achieved: achieved,
              displaySummary: displaySummary,
              showMainTotalsCard: showMainTotalsCard,
              showSimpleAggregate: showSimpleAgg,
              showIndividualGoalProgress: showIndListValues,
              rankByPerformance: rankByPerf,
              ranking: rank,
              rows: rows,
              sourceBusinessName: m.sourceBusinessName || data.businessName || '',
              sourceBusinessImage: m.sourceBusinessImage || data.businessImage || ''
            });
          } else {
            var cur = parseMetricNumber(m.current) || 0;
            var goal = parseMetricNumber(m.goal) || 0;
            var curStr = String(m.current != null ? m.current : '').trim();
            var goalStr = String(m.goal != null ? m.goal : '').trim();
            var hasCur = curStr !== '';
            var hasGoal = goalStr !== '';
            var achieved = goal > 0 && cur >= goal;
            var valuesText;
            if (m.displayAsPercent && goal > 0) {
              var pctVal = Math.round((cur / goal) * 100);
              valuesText =
                '<span class="current">' + escapeHtml(String(pctVal)) + '%</span>';
              if (hasCur && hasGoal) {
                valuesText +=
                  '<span class="result-values-sub">' +
                  escapeHtml(curStr) +
                  ' / ' +
                  escapeHtml(goalStr) +
                  '</span>';
              }
            } else if (hasCur && hasGoal) {
              valuesText =
                '<span class="current">' +
                escapeHtml(curStr) +
                '</span> / <span class="goal">' +
                escapeHtml(goalStr) +
                '</span>';
            } else if (hasCur) {
              valuesText = '<span class="current">' + escapeHtml(curStr) + '</span>';
            } else if (hasGoal) {
              valuesText = '<span class="goal">' + escapeHtml(goalStr) + '</span>';
            } else {
              valuesText = '';
            }
            displayed.push({
              type: 'summary',
              heading: m.heading || 'Metric',
              valuesHtml: valuesText,
              achieved: achieved,
              sourceBusinessName: m.sourceBusinessName || data.businessName || '',
              sourceBusinessImage: m.sourceBusinessImage || data.businessImage || ''
            });
          }
        }

        grid.innerHTML = '';
        grid.classList.remove('count-1', 'count-2', 'count-3', 'count-4', 'empty-watermark');

        if (displayed.length === 0) {
          grid.classList.add('empty', 'empty-watermark');
          grid.innerHTML = '';
          var wm = document.createElement('div');
          wm.className = 'results-watermark';
          wm.textContent = 'Metrics View';
          grid.appendChild(wm);
          return;
        }

        grid.classList.remove('empty', 'empty-watermark');
        grid.classList.add('count-' + displayed.length);

        for (var j = 0; j < displayed.length; j++) {
          var item = displayed[j];
          var col = document.createElement('div');
          col.className = 'result-column result-column-type-' + item.type;
          var ownerMeta = document.createElement('div');
          ownerMeta.className = 'result-owner-meta';
          ownerMeta.innerHTML = '<span class="result-owner-pic"></span><span class="result-owner-name">' + escapeHtml(item.sourceBusinessName || 'Board') + '</span>';
          var picEl = ownerMeta.querySelector('.result-owner-pic');
          if (picEl && item.sourceBusinessImage) {
            var imgUrl = String(item.sourceBusinessImage);
            picEl.style.backgroundImage = 'url("' + imgUrl.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '")';
          }
          col.appendChild(ownerMeta);
          var metricTitleBar = document.createElement('div');
          metricTitleBar.className = 'result-column-metric-title';
          metricTitleBar.textContent = item.heading || (item.type === 'summary' ? 'Metric' : 'Summary');
          col.appendChild(metricTitleBar);

          if (item.type === 'summary') {
            var card = document.createElement('div');
            card.className = 'result-card result-card-numbers-only' + (item.achieved ? ' achieved' : '');
            card.innerHTML =
              '<div class="result-card-inner">' +
              '<p class="result-values">' + item.valuesHtml + '</p>' +
              '</div>';
            col.appendChild(card);
          } else {
            if (item.showMainTotalsCard) {
              var card2 = document.createElement('div');
              card2.className = 'result-card result-card-summary result-card-numbers-only' + (item.achieved ? ' achieved' : '');
              card2.innerHTML =
                '<div class="result-card-inner">' +
                '<p class="result-values">' + item.valuesHtml + '</p>' +
                '</div>';
              col.appendChild(card2);
            }
            if (item.rows && item.rows.length > 0 && item.showIndividualGoalProgress) {
              var withPct = item.rows.map(function (r) {
                var cur = parseMetricNumber(r.current) || 0;
                var goal = parseMetricNumber(r.goal) || 0;
                var indGoal = r.individualGoal != null ? parseMetricNumber(r.individualGoal) : NaN;
                if (!isNaN(indGoal) && indGoal > 0) goal = indGoal;
                return { name: r.name || '', goal: r.goal, current: r.current, individualGoal: r.individualGoal, pct: goal > 0 ? (cur / goal) * 100 : 0 };
              });
              if (item.rankByPerformance !== false) {
                withPct.sort(function (a, b) { return b.pct - a.pct; });
              }
              var displayAsPct = !!(item.ranking && item.ranking.displayAsPercent);
              var list = document.createElement('div');
              var hasAggregate = !!item.showMainTotalsCard;
              list.className = 'ranking-results' + (hasAggregate ? '' : ' ranking-results-full');
              var ul = document.createElement('ul');
              ul.className = 'ranking-list';
              var showMissionCol = !!(item.ranking && item.ranking.showIndividualGoal);
              if (
                item.showSimpleAggregate &&
                item.rows &&
                item.rows.length > 0 &&
                !item.showMainTotalsCard
              ) {
                var tlD = ensureTotalLine(item.ranking);
                var misD = totalCurrentManualMismatch(item.rows, tlD);
                var totVal = formatTotalLineDisplay(item.rows, tlD, displayAsPct);
                var liTot = document.createElement('li');
                liTot.className =
                  'ranking-list-item ranking-list-item--total' + (misD ? ' ranking-list-item--total-mismatch' : '');
                var midTot = showMissionCol
                  ? '<span class="ranking-mission-slot ranking-mission-slot--empty" aria-hidden="true"></span>'
                  : '<span class="ranking-mission-slot ranking-mission-slot--empty" aria-hidden="true"></span>';
                liTot.innerHTML =
                  '<span class="ranking-name ranking-name--total">Total</span>' +
                  midTot +
                  '<span class="ranking-value ranking-value--stack">' +
                  (totVal ? '<span class="ranking-value-line">' + totVal + '</span>' : '') +
                  (misD
                    ? '<span class="ranking-total-mismatch-msg" role="alert">Current info below doesn\'t match this number</span>'
                    : '') +
                  '</span>';
                ul.appendChild(liTot);
              }
              for (var k = 0; k < withPct.length; k++) {
                var it = withPct[k];
                var rawName = it.name != null ? String(it.name).trim() : '';
                var nameHtml = rawName ? escapeHtml(rawName) : '<span class="ranking-name-empty">—</span>';
                var indGoalPart = (it.individualGoal != null && String(it.individualGoal).trim()) ? ('<span class="ranking-individual-goal">' + escapeHtml(String(it.individualGoal)) + '</span>') : '';
                var valText = formatIndividualPairDisplay(it, displayAsPct);
                var mid = indGoalPart
                  ? ('<span class="ranking-mission-slot">' + indGoalPart + '</span>')
                  : ('<span class="ranking-mission-slot ranking-mission-slot--empty" aria-hidden="true"></span>');
                var li = document.createElement('li');
                li.className = 'ranking-list-item';
                li.innerHTML =
                  '<span class="ranking-name">' + nameHtml + '</span>' +
                  mid +
                  '<span class="ranking-value">' + valText + '</span>';
                ul.appendChild(li);
              }
              list.appendChild(ul);
              col.appendChild(list);
            }
          }
          grid.appendChild(col);
        }
      }

      function loadFromLocalStorage(key) {
        var raw;
        try { raw = localStorage.getItem(key); } catch (e) { raw = null; }
        var data = { businessName: '', businessImage: '', displayBoardColor: '', metrics: [] };
        if (raw) {
          try {
            var parsed = JSON.parse(raw);
            data.businessName = (parsed.businessName != null) ? String(parsed.businessName) : '';
            data.businessImage = (parsed.businessImage != null) ? String(parsed.businessImage) : '';
            data.displayBoardColor =
              parsed.displayBoardColor != null ? String(parsed.displayBoardColor) : '';
            data.metrics = (parsed && parsed.metrics) ? parsed.metrics.slice(0, 4) : (Array.isArray(parsed) ? parsed.slice(0, 4) : []);
          } catch (e) {}
        }
        return data;
      }

      function cloneMetricWithSource(metric, businessName, businessImage) {
        var out = JSON.parse(JSON.stringify(metric || {}));
        out.sourceBusinessName = businessName || '';
        out.sourceBusinessImage = businessImage || '';
        return out;
      }

      function buildCombinedHomeDashboard(userCtx) {
        return window.metricsLoadBusinessDashboard(userCtx.userId).then(function (homeDash) {
          var combined = {
            businessName: homeDash.businessName || '',
            businessImage: homeDash.businessImage || '',
            displayBoardColor: homeDash.displayBoardColor || '',
            metrics: []
          };
          var ownMetrics = Array.isArray(homeDash.metrics) ? homeDash.metrics : [];
          var ownTagged = ownMetrics.map(function (m) {
            return cloneMetricWithSource(m, combined.businessName, combined.businessImage);
          });
          if (!window.metricsFetchInvitesForEmail) {
            combined.metrics = ownTagged;
            return combined;
          }
          return window.metricsFetchInvitesForEmail(userCtx.email).then(function (res) {
            var list = (res && res.data) ? res.data : [];
            var slotInvites = list.filter(function (r) {
              return r && r.metric_index != null && r.metric_index >= 0 && r.metric_index <= 9 && r.status !== 'revoked';
            });
            if (!slotInvites.length) {
              combined.metrics = ownTagged;
              if (window.metricsCombineSlideOrder && userCtx && userCtx.userId) {
                var keys0 = window.metricsCombineSlideOrder.loadMerged(userCtx.userId, [], ownTagged.length);
                var map0 = {};
                ownTagged.forEach(function (mm, ii) {
                  map0['p:' + ii] = mm;
                });
                var ord0 = [];
                keys0.forEach(function (k) {
                  if (map0[k]) ord0.push(map0[k]);
                });
                if (ord0.length) combined.metrics = ord0;
              }
              return combined;
            }
            var owners = {};
            slotInvites.forEach(function (r) { owners[r.owner_user_id] = true; });
            var ownerIds = Object.keys(owners);
            return Promise.all(ownerIds.map(function (oid) {
              return window.metricsLoadBusinessDashboard(oid);
            })).then(function (dashboards) {
              var byOwner = {};
              ownerIds.forEach(function (oid, idx) {
                byOwner[oid] = dashboards[idx];
              });
              if (window.metricsCombineSlideOrder && userCtx && userCtx.userId) {
                var keyMap = {};
                slotInvites.forEach(function (inv) {
                  var dash = byOwner[inv.owner_user_id];
                  var metric = dash && dash.metrics ? dash.metrics[inv.metric_index] : null;
                  if (!metric) return;
                  keyMap['s:' + inv.owner_user_id + ':' + inv.metric_index] = cloneMetricWithSource(
                    metric,
                    (dash && dash.businessName) || inv.business_name || '',
                    (dash && dash.businessImage) || ''
                  );
                });
                ownTagged.forEach(function (mm, ii) {
                  keyMap['p:' + ii] = mm;
                });
                var orderKeys = window.metricsCombineSlideOrder.loadMerged(
                  userCtx.userId,
                  slotInvites,
                  ownTagged.length
                );
                combined.metrics = [];
                orderKeys.forEach(function (k) {
                  if (keyMap[k]) combined.metrics.push(keyMap[k]);
                });
              } else {
                var invitedMetrics = [];
                slotInvites.forEach(function (inv) {
                  var dash = byOwner[inv.owner_user_id];
                  var metric = dash && dash.metrics ? dash.metrics[inv.metric_index] : null;
                  if (!metric) return;
                  invitedMetrics.push(cloneMetricWithSource(
                    metric,
                    (dash && dash.businessName) || inv.business_name || '',
                    (dash && dash.businessImage) || ''
                  ));
                });
                combined.metrics = invitedMetrics.concat(ownTagged);
              }
              return combined;
            });
          }).catch(function () {
            combined.metrics = ownTagged;
            return combined;
          });
        });
      }

      var RESULTS_THEME_KEY = 'metricsResultsDisplayTheme';
      var INPUT_THEME_KEY = 'metricsInputDisplayTheme';
      var DISPLAY_REFRESH_SIGNAL_KEY = 'metricsDisplayRefreshSignal';
      var lastRenderedHash = '';
      var autoRefreshTimer = null;

      function stableHash(obj) {
        try { return JSON.stringify(obj || {}); } catch (e) { return ''; }
      }

      function renderDashboardIfChanged(data) {
        var h = stableHash(data);
        if (h && h === lastRenderedHash) return;
        lastRenderedHash = h;
        renderDashboard(data || {});
      }
      function applyResultsDisplayTheme(mode) {
        var m = mode === 'dark' || mode === 'custom' ? 'dark' : 'light';
        document.body.classList.remove(
          'results-display-theme-light',
          'results-display-theme-dark',
          'results-display-theme-custom'
        );
        document.body.classList.add('results-display-theme-' + m);
        document.body.classList.toggle('results-theme-dark', m === 'dark');
        document.body.classList.toggle('results-theme-light', m === 'light');
        try {
          localStorage.setItem(RESULTS_THEME_KEY, m);
        } catch (e) {}
        syncDisplayBoardAccent(window.__mvLastDisplayDashboard || {});
        document.querySelectorAll('.results-theme-seg').forEach(function (btn) {
          var active = btn.getAttribute('data-display-theme') === m;
          btn.classList.toggle('results-theme-seg-active', active);
          btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
      }

      function initResultsTheme() {
        var stored = 'light';
        try {
          stored = localStorage.getItem(RESULTS_THEME_KEY) || '';
          if (stored === 'custom') stored = 'dark';
          if (stored !== 'light' && stored !== 'dark') {
            var legacy = localStorage.getItem(INPUT_THEME_KEY) || 'light';
            stored = legacy === 'dark' ? 'dark' : 'light';
          }
        } catch (e) {
          stored = 'light';
        }
        applyResultsDisplayTheme(stored);
      }

      function loadDashboardForOwner(ownerId, userCtx) {
        if (!window.metricsLoadBusinessDashboard) {
          return Promise.resolve(loadFromLocalStorage('metricsDashboard'));
        }
        if (!uuidLooksValid(ownerParam) || ownerId === userCtx.userId) {
          return buildCombinedHomeDashboard(userCtx)
            .catch(function () { return loadFromLocalStorage('metricsDashboard'); });
        }
        return window.metricsLoadBusinessDashboard(ownerId)
          .catch(function () { return loadFromLocalStorage('metricsDashboard'); });
      }

      function setupAutoRefresh(ownerId, userCtx) {
        function refreshNow() {
          loadDashboardForOwner(ownerId, userCtx).then(function (data) {
            renderDashboardIfChanged(data);
          });
        }
        refreshNow();
        autoRefreshTimer = setInterval(refreshNow, 6000);
        window.addEventListener('storage', function (e) {
          if (!e || e.key !== DISPLAY_REFRESH_SIGNAL_KEY) return;
          refreshNow();
        });
      }

      Promise.resolve()
        .then(function () {
          return window.metricsSyncContextFromSession ? window.metricsSyncContextFromSession() : null;
        })
        .then(function () {
          document.querySelectorAll('.results-theme-seg').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var m = btn.getAttribute('data-display-theme') || 'light';
              applyResultsDisplayTheme(m);
            });
          });
          (function initBottomDock() {
            var dock = document.getElementById('resultsBottomDock');
            var reveal = document.getElementById('resultsBottomReveal');
            var actions = document.getElementById('resultsBottomActions');
            if (!dock || !reveal) return;
            function setOpen(open) {
              dock.classList.toggle('results-bottom-dock--open', open);
              reveal.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            reveal.addEventListener('click', function (e) {
              e.stopPropagation();
              setOpen(!dock.classList.contains('results-bottom-dock--open'));
            });
            document.addEventListener('click', function (e) {
              if (!dock.classList.contains('results-bottom-dock--open')) return;
              if (!dock.contains(e.target)) setOpen(false);
            });
            reveal.addEventListener('keydown', function (e) {
              if (e.key === 'Escape') setOpen(false);
            });
            if (actions) {
              actions.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                  setOpen(false);
                  reveal.focus();
                }
              });
            }
          })();
          initResultsTheme();
          var userCtx = window.metricsGetUserContext ? window.metricsGetUserContext() : null;
          if (!userCtx || !userCtx.email) {
            window.location.href = window.metricsAppUrl('');
            return null;
          }

          var linkInput = document.getElementById('linkToInput');
          var ownerId = uuidLooksValid(ownerParam) ? ownerParam : userCtx.userId;
          if (linkInput) {
            linkInput.href = uuidLooksValid(ownerParam) && ownerParam !== userCtx.userId
              ? window.metricsAppUrl('input/?owner=' + encodeURIComponent(ownerId))
              : window.metricsAppUrl('input/');
          }

          return loadDashboardForOwner(ownerId, userCtx).then(function (data) {
            renderDashboardIfChanged(data);
            setupAutoRefresh(ownerId, userCtx);
          });
        });
    })();
  </script>
</body>
</html>
